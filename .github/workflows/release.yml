name: Release

on:
  push:
    tags: ['v*']

env:
  # Pin versions for cache keys — bump these to force a rebuild
  LSMASH_REF: master
  M4ACUT_REF: master
  ATOMICPARSLEY_VERSION: '20240608.083822'
  YTDLP_VERSION: '2025.12.08'
  FFMPEG_VERSION: '8.1'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - name: Cache native binaries
        id: native-cache
        uses: actions/cache@v4
        with:
          path: resources/bin/darwin
          key: native-bins-${{ runner.os }}-${{ runner.arch }}-lsmash-${{ env.LSMASH_REF }}-m4acut-${{ env.M4ACUT_REF }}-ap-${{ env.ATOMICPARSLEY_VERSION }}-ytdlp-${{ env.YTDLP_VERSION }}-ffmpeg-${{ env.FFMPEG_VERSION }}

      - name: Compile m4acut
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: |
          brew install automake libtool
          git clone https://github.com/l-smash/l-smash.git /tmp/l-smash
          cd /tmp/l-smash
          ./configure
          make -j$(sysctl -n hw.ncpu)
          sudo make install
          git clone https://github.com/nu774/m4acut.git /tmp/m4acut
          cd /tmp/m4acut
          autoreconf -fi
          ./configure LIBS="-liconv"
          make -j$(sysctl -n hw.ncpu)
          cp m4acut $GITHUB_WORKSPACE/resources/bin/darwin/m4acut
          chmod +x $GITHUB_WORKSPACE/resources/bin/darwin/m4acut

      - name: Install AtomicParsley
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: |
          brew install atomicparsley
          cp $(which AtomicParsley) resources/bin/darwin/AtomicParsley
          chmod +x resources/bin/darwin/AtomicParsley

      - name: Install yt-dlp
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: |
          curl -L --fail --retry 3 \
            "https://github.com/yt-dlp/yt-dlp/releases/download/$YTDLP_VERSION/yt-dlp_macos" \
            -o resources/bin/darwin/yt-dlp
          chmod +x resources/bin/darwin/yt-dlp

      - name: Install ffmpeg and ffprobe
        if: steps.native-cache.outputs.cache-hit != 'true'
        run: |
          brew install ffmpeg
          cp "$(brew --prefix ffmpeg)/bin/ffmpeg" resources/bin/darwin/ffmpeg
          cp "$(brew --prefix ffmpeg)/bin/ffprobe" resources/bin/darwin/ffprobe
          chmod +x resources/bin/darwin/ffmpeg resources/bin/darwin/ffprobe

      - name: Build DMG
        run: pnpm run make

      - name: Upload release
        uses: softprops/action-gh-release@v3
        with:
          files: out/make/**/*.dmg
